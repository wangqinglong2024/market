<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 820" width="600" height="820">
  <defs>
    <!-- 蜡笔手绘抖动：让干净路径的边缘变粗糙，像蜡笔线 -->
    <filter id="crayon" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- 落地投影 -->
  <ellipse cx="300" cy="786" rx="140" ry="20" fill="#4a3b30" opacity="0.14"/>

  <g filter="url(#crayon)" stroke-linejoin="round" stroke-linecap="round">
    <!-- 每个色块：先白描边垫底(留白圈)，再压黑蜡笔线 → 复刻“颜色不到边” -->

    <!-- 耳朵 -->
    <g>
      <path d="M158 255 m-26 0 a26 26 0 1 0 52 0 a26 26 0 1 0 -52 0" fill="#f4d8bb" stroke="#fffdf7" stroke-width="11"/>
      <path d="M442 255 m-26 0 a26 26 0 1 0 52 0 a26 26 0 1 0 -52 0" fill="#f4d8bb" stroke="#fffdf7" stroke-width="11"/>
      <path d="M158 255 m-26 0 a26 26 0 1 0 52 0 a26 26 0 1 0 -52 0" fill="none" stroke="#3a3335" stroke-width="6"/>
      <path d="M442 255 m-26 0 a26 26 0 1 0 52 0 a26 26 0 1 0 -52 0" fill="none" stroke="#3a3335" stroke-width="6"/>
    </g>

    <!-- 腿 -->
    <g>
      <path d="M258 692 C252 726 252 752 262 766 C276 772 292 768 292 748 L292 694 Z" fill="#f4d8bb" stroke="#fffdf7" stroke-width="10"/>
      <path d="M342 692 C348 726 348 752 338 766 C324 772 308 768 308 748 L308 694 Z" fill="#f4d8bb" stroke="#fffdf7" stroke-width="10"/>
      <path d="M258 692 C252 726 252 752 262 766 C276 772 292 768 292 748 L292 694 Z" fill="none" stroke="#3a3335" stroke-width="6"/>
      <path d="M342 692 C348 726 348 752 338 766 C324 772 308 768 308 748 L308 694 Z" fill="none" stroke="#3a3335" stroke-width="6"/>
    </g>

    <!-- 手臂 -->
    <g>
      <path d="M178 462 C120 482 110 548 124 600 C158 592 182 546 197 506 Z" fill="#e9b84a" stroke="#fffdf7" stroke-width="11"/>
      <path d="M422 462 C480 482 490 548 476 600 C442 592 418 546 403 506 Z" fill="#e9b84a" stroke="#fffdf7" stroke-width="11"/>
      <path d="M178 462 C120 482 110 548 124 600 C158 592 182 546 197 506 Z" fill="none" stroke="#3a3335" stroke-width="6"/>
      <path d="M422 462 C480 482 490 548 476 600 C442 592 418 546 403 506 Z" fill="none" stroke="#3a3335" stroke-width="6"/>
    </g>

    <!-- 身体：一整块黄胖身（帽衫连短裤） -->
    <g>
      <path d="M300 355 C190 355 150 440 150 545 C150 652 212 706 300 706 C388 706 450 652 450 545 C450 440 410 355 300 355 Z" fill="#e9b84a" stroke="#fffdf7" stroke-width="12"/>
      <path d="M300 355 C190 355 150 440 150 545 C150 652 212 706 300 706 C388 706 450 652 450 545 C450 440 410 355 300 355 Z" fill="none" stroke="#3a3335" stroke-width="7"/>
    </g>
    <!-- 腰线 + 肚脐 -->
    <path d="M176 604 C240 640 360 640 424 604" fill="none" stroke="#3a3335" stroke-width="5"/>
    <path d="M300 582 q7 9 0 18" fill="none" stroke="#3a3335" stroke-width="5"/>

    <!-- 手 -->
    <g>
      <circle cx="120" cy="606" r="23" fill="#f4d8bb" stroke="#fffdf7" stroke-width="10"/>
      <circle cx="480" cy="606" r="23" fill="#f4d8bb" stroke="#fffdf7" stroke-width="10"/>
      <circle cx="120" cy="606" r="23" fill="none" stroke="#3a3335" stroke-width="6"/>
      <circle cx="480" cy="606" r="23" fill="none" stroke="#3a3335" stroke-width="6"/>
      <path d="M110 602 v12 M120 600 v16 M130 602 v12" fill="none" stroke="#3a3335" stroke-width="3"/>
      <path d="M470 602 v12 M480 600 v16 M490 602 v12" fill="none" stroke="#3a3335" stroke-width="3"/>
    </g>

    <!-- 头 -->
    <g>
      <circle cx="300" cy="250" r="150" fill="#f4d8bb" stroke="#fffdf7" stroke-width="12"/>
      <circle cx="300" cy="250" r="150" fill="none" stroke="#3a3335" stroke-width="7"/>
    </g>

    <!-- 头发：乱翘棕发 -->
    <g>
      <path d="M156 246 C148 150 236 98 300 98 C366 98 454 150 444 250
               C438 214 410 200 394 216 C404 176 372 160 352 176
               C356 146 326 138 312 158 C312 128 286 128 286 158
               C266 140 238 156 248 180 C224 164 198 182 212 212 C196 200 166 214 156 246 Z"
            fill="#8a5a36" stroke="#fffdf7" stroke-width="10"/>
      <path d="M156 246 C148 150 236 98 300 98 C366 98 454 150 444 250
               C438 214 410 200 394 216 C404 176 372 160 352 176
               C356 146 326 138 312 158 C312 128 286 128 286 158
               C266 140 238 156 248 180 C224 164 198 182 212 212 C196 200 166 214 156 246 Z"
            fill="none" stroke="#3a3335" stroke-width="6"/>
      <!-- 发丝浅色高光 -->
      <path d="M250 150 C272 136 302 132 330 146 M206 200 C222 180 244 170 266 172 M334 172 C354 166 372 176 386 196"
            fill="none" stroke="#b98d5f" stroke-width="4" opacity="0.85"/>
    </g>

    <!-- 脸：黑豆眼 + 腮红 + 小嘴 -->
    <g>
      <ellipse cx="256" cy="260" rx="16" ry="22" fill="#2f2a2b" stroke="none"/>
      <ellipse cx="344" cy="260" rx="16" ry="22" fill="#2f2a2b" stroke="none"/>
      <circle cx="262" cy="252" r="5" fill="#fffdf7" stroke="none"/>
      <circle cx="350" cy="252" r="5" fill="#fffdf7" stroke="none"/>
      <circle cx="214" cy="290" r="24" fill="#f2a0ab" opacity="0.85" stroke="none"/>
      <circle cx="386" cy="290" r="24" fill="#f2a0ab" opacity="0.85" stroke="none"/>
      <path d="M282 296 Q300 314 318 296" fill="none" stroke="#3a3335" stroke-width="6"/>
    </g>
  </g>
</svg>
